# ~60M params, ~1024 context, trained on ~500M tokens (~1.8 epochs of your 298M corpus)
vocab_size: 8000
dim: 640
n_layers: 10
n_heads: 10
max_seq_len: 1024
dropout: 0.0
tie_embeddings: true

mix: {fineweb_edu: 0.5, pubmed: 0.5}

batch_size: 16       # per-step micro-batch (sequences). Lower this first if you OOM.
grad_accum: 8        # effective batch = 16 * 8 * 1024 = 131k tokens/step
lr: 8.0e-4
min_lr: 8.0e-5
warmup_steps: 200
max_steps: 4000      # 4000 * 131k = ~524M tokens seen
weight_decay: 0.1
grad_clip: 1.0
eval_every: 250

dtype: bfloat16      # -> float16 if your GPU is pre-Ampere
